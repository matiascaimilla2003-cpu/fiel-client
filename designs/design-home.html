<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CFIEL · Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #16161f; overflow: hidden; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>
<script type="text/babel" data-presets="env,react">
const App = () => (
  <DesignCanvas title="CFIEL · Home" subtitle="Pantalla principal + modales QR/Racha/Misiones + Referidos · Tarjeta de membresía con 4 niveles">
    <DCSection id="home" title="Home" subtitle="Hero más compacto · Top bar limpio · Tap en cada card abre su detalle">
      <DCArtboard id="home-main" label="Home — interactivo (toca las cards)" width={430} height={900}>
        <HomeScreen userName="CARLOS"/>
      </DCArtboard>
      <DCArtboard id="home-qr" label="Modal · QR Personal" width={430} height={900}>
        <HomeScreen userName="CARLOS" initialModal="qr"/>
      </DCArtboard>
      <DCArtboard id="home-streak" label="Modal · Racha" width={430} height={900}>
        <HomeScreen userName="CARLOS" initialModal="streak"/>
      </DCArtboard>
      <DCArtboard id="home-missions" label="Modal · Misiones" width={430} height={900}>
        <HomeScreen userName="CARLOS" initialModal="missions"/>
      </DCArtboard>
      <DCArtboard id="home-referidos" label="Pantalla · Referidos" width={430} height={900}>
        <HomeScreen userName="CARLOS" initialScreen="referidos"/>
      </DCArtboard>
    </DCSection>
    <DCSection id="tiers" title="Tarjeta de membresía · Niveles" subtitle="La tarjeta evoluciona con el nivel · Color, emblema, sheen y sparkles automáticos">
      <DCArtboard id="tier-bronce"  label="BRONCE · 240 pts (camino a Plata)"  width={430} height={900}>
        <HomeScreen userName="CARLOS" tier="BRONCE"  points={240}/>
      </DCArtboard>
      <DCArtboard id="tier-plata"   label="PLATA · 720 pts (camino a Oro)"     width={430} height={900}>
        <HomeScreen userName="CARLOS" tier="PLATA"   points={720}/>
      </DCArtboard>
      <DCArtboard id="tier-oro"     label="ORO · 1.620 pts (camino a Platino)" width={430} height={900}>
        <HomeScreen userName="CARLOS" tier="ORO"     points={1620}/>
      </DCArtboard>
      <DCArtboard id="tier-platino" label="PLATINO · 3.200 pts (nivel máximo)" width={430} height={900}>
        <HomeScreen userName="CARLOS" tier="PLATINO" points={3200}/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
