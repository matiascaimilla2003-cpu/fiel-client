<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CFIEL · Historial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #16161f; overflow: hidden; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="historial-screen.jsx"></script>
<script type="text/babel" data-presets="env,react">
const App = () => (
  <DesignCanvas title="CFIEL · Historial" subtitle="Movimientos agrupados por mes · Filtros · Detalle por movimiento · Estado vacío">
    <DCSection id="historial" title="Historial" subtitle="Lista de transacciones de puntos con stats arriba">
      <DCArtboard id="historial-main" label="Historial — Todos" width={430} height={900}>
        <HistorialScreen/>
      </DCArtboard>
      <DCArtboard id="historial-ganados" label="Filtro — Ganados" width={430} height={900}>
        <HistorialScreen initialFilter="pos"/>
      </DCArtboard>
      <DCArtboard id="historial-usados" label="Filtro — Usados" width={430} height={900}>
        <HistorialScreen initialFilter="neg"/>
      </DCArtboard>
      <DCArtboard id="historial-detail" label="Modal · Detalle de movimiento" width={430} height={900}>
        <HistorialScreen initialModal="detail"/>
      </DCArtboard>
      <DCArtboard id="historial-empty" label="Estado · Sin movimientos (usuario nuevo)" width={430} height={900}>
        <HistorialScreen empty/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
