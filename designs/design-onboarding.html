<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" data-presets="env,react">
const App = () => (
  <DesignCanvas title="CFIEL · Onboarding rediseñado" subtitle="4 pantallas — dark premium, indigo eléctrico, sin emojis">
    <DCSection id="flow" title="Flujo de onboarding" subtitle="Orden real que ve el usuario · Cada pantalla es interactiva (haz click)">

      <DCArtboard id="slides" label="02 · Slides · Swipe →" width={430} height={900}>

      </DCArtboard>
      <DCArtboard id="registro" label="03 · Registro · 4 pasos" width={430} height={900}>
        <RegistroScreen/>
      </DCArtboard>
      <DCArtboard id="bienvenida" label="04 · Bienvenida" width={430} height={900}>
        <BienvenidaScreen userName="CARLOS"/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
